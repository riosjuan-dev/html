<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício 1</title>
    <style>
        table {
            border-collapse: collapse;
            margin: auto;
        }

        td, th {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        .titulo {
            background-color: yellow;
            font-weight: bold;
        }

        .cabecalho {
            background-color: lightblue;
            font-weight: bold;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <th colspan="2" class="titulo">Vendas março 2010</th>
    </tr>
    <tr class="cabecalho">
        <th>Carro</th>
        <th>Unidades</th>
    </tr>
    <tr>
        <td>Gol</td>
        <td>250.000</td>
    </tr>
    <tr>
        <td>Uno</td>
        <td>123.000</td>
    </tr>

    <tr>
        <th colspan="2" class="titulo">Vendas fev. 2010</th>
    </tr>
    <tr class="cabecalho">
        <th>Carro</th>
        <th>Unidades</th>
    </tr>
    <tr>
        <td>Gol</td>
        <td>250.000</td>
    </tr>
    <tr>
        <td>Uno</td>
        <td>123.000</td>
    </tr>
</table>

</body>
</html>
